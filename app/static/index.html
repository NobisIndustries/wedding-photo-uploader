<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body>
    <!-- PIN Screen -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="auth-icon">&#128248;</div>
            <h1>Our Wedding</h1>
            <p>Enter the PIN to share your photos & videos</p>
            <form id="pin-form">
                <input type="text" id="name-input"
                       placeholder="Your name (optional)" autocomplete="name"
                       autocapitalize="words" spellcheck="false" maxlength="50">
                <input type="password" id="pin-input" inputmode="text" pattern="[0-9a-zA-Z]*"
                       placeholder="Enter PIN" autocomplete="off" autocapitalize="off"
                       autocorrect="off" spellcheck="false" maxlength="20">
                <button type="submit" class="btn btn-primary">Enter</button>
            </form>
            <p id="pin-error" class="error hidden">Invalid PIN. Please try again.</p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="screen hidden">
        <!-- Header -->
        <header class="app-header">
            <h1>Our Wedding Photos</h1>
            <div class="header-actions">
                <a id="download-all-btn" class="btn btn-secondary"
                   href="/api/files/download-all" title="Download all as ZIP">&#11015;<span class="btn-label"> ZIP</span></a>
                <label class="btn btn-upload" for="file-input">
                    <span class="upload-icon">+</span> Upload
                </label>
            </div>
            <input type="file" id="file-input" multiple
                   accept="image/*,video/*" class="hidden">
        </header>

        <!-- Admin: official photo toggle -->
        <label id="official-toggle" class="official-toggle hidden">
            <input type="checkbox" id="official-checkbox" checked>
            Mark uploads as official
        </label>

        <!-- Upload Progress -->
        <div id="upload-progress" class="upload-progress hidden"></div>

        <!-- Gallery Tabs -->
        <div class="gallery-tabs">
            <button class="gallery-tab active" data-filter="all">All Photos</button>
            <button class="gallery-tab" data-filter="official">Official Photos</button>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="gallery">
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">&#128247;</div>
                <p>No photos yet — be the first to share!</p>
            </div>
        </div>

        <!-- Infinite scroll sentinel -->
        <div id="load-more" class="load-more hidden">
            <div class="scroll-spinner"></div>
        </div>

        <footer class="app-footer">
            <a href="#" id="logout-btn" class="logout-link">Log out</a>
        </footer>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <a id="lightbox-download" class="lightbox-download hidden"
           href="#" title="Download full quality">&#11015; Full Quality</a>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
        <div class="lightbox-content" id="lightbox-content"></div>
        <div class="lightbox-caption hidden" id="lightbox-caption"></div>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.2.3/dist/tus.min.js"></script>
    <script src="/static/js/auth.js?v=4"></script>
    <script src="/static/js/upload.js?v=4"></script>
    <script src="/static/js/gallery.js?v=4"></script>
    <script src="/static/js/app.js?v=4"></script>
</body>
</html>
